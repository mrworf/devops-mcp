services:
  secretsauce:
    # Supported topology: exactly one replica. Runtime references are instance-local;
    # sticky sessions do not replace the unimplemented shared atomic capability store.
    deploy:
      replicas: 1
    build: .
    image: secretsauce-mcp:latest
    ports:
      - "8080:8080"
    volumes:
      - ./examples/config.yaml:/config/config.yaml:ro
      # Replace this mount source with a custom extend/replace rules file as needed.
      - ./config/secretlint.yaml:/config/secretlint.yaml:ro
      # Sensitive-name rules use the same immutable-default/custom-read-only pattern.
      - ./config/sensitive-names.yaml:/config/sensitive-names.yaml:ro
      - ./secrets:/run/secrets:ro
      # Stable read-only signing keys keep built-in OAuth access tokens valid after restart.
      - ./oauth:/run/oauth:ro
      # Audit and hash-only OAuth refresh state need writable persistent storage.
      - ./audit:/var/lib/secretsauce/audit
      # This refresh-state mount has a single-process writer contract.
      - ./oauth-state:/var/lib/secretsauce/oauth
      # gref_/sec_ capability state is intentionally ephemeral and is not mounted.
    environment:
      CONFIG_PATH: /config/config.yaml
      SECRETLINT_CONFIG_PATH: /config/secretlint.yaml
      SENSITIVE_NAMES_CONFIG_PATH: /config/sensitive-names.yaml
      SECRETSAUCE_MCP_TOKEN: change-me-dev-token
      PORTAINER_API_KEY_FILE: /run/secrets/portainer_api_key
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
